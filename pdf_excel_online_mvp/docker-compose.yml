services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - backend_storage:/app/storage

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://localhost:8000
    depends_on:
      - backend

volumes:
  backend_storage:
